<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treasure Island Camp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-dark: #1e4d2b;
      --green-mid: #2e6b3e;
      --cream: #f5f0e6;
      --amber: #c8860a;
      --text-dark: #1a2e1e;
      --text-mid: #3d5a42;
    }
    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .login-logo {
      width: 80px;
      height: auto;
      margin-bottom: 1.5rem;
    }
    .login-card h1 {
      font-family: 'Playfair Display', serif;
      color: var(--green-dark);
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
    }
    .login-card p {
      color: var(--text-mid);
      font-size: 0.9rem;
      font-weight: 300;
      margin-bottom: 1.5rem;
    }
    .login-input {
      width: 100%;
      padding: 0.7rem 1rem;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      border: 2px solid var(--green-mid);
      border-radius: 8px;
      outline: none;
      text-align: center;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    .login-input:focus {
      border-color: var(--green-dark);
      box-shadow: 0 0 0 3px rgba(46, 107, 62, 0.15);
    }
    .login-btn {
      width: 100%;
      padding: 0.7rem;
      background: var(--green-dark);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover { background: var(--green-mid); }
    .login-error {
      color: #c33;
      font-size: 0.85rem;
      margin-top: 0.75rem;
      display: none;
    }
    .login-footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <img src="logo.png" alt="Treasure Island Camp" class="login-logo" />
    <h1>Treasure Island Camp</h1>
    <p>Enter the family password to continue</p>
    <form id="login-form">
      <input type="password" class="login-input" id="password-input" placeholder="Password" autocomplete="off" />
      <button type="submit" class="login-btn">Enter</button>
    </form>
    <p class="login-error" id="login-error">Incorrect password. Please try again.</p>
    <p class="login-footer">Pointe au Baril, Ontario · Est. 1926</p>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const password = document.getElementById('password-input').value;

      const response = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });

      if (response.ok) {
        window.location.href = '/';
      } else {
        document.getElementById('login-error').style.display = 'block';
        document.getElementById('password-input').value = '';
        document.getElementById('password-input').focus();
      }
    });
  </script>

</body>
</html>
