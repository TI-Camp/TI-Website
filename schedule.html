<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule - Treasure Island Camp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #1e4d2b;
      --green-mid:   #2e6b3e;
      --green-light: #4a8c5c;
      --cream:       #f5f0e6;
      --cream-dark:  #ede6d8;
      --amber:       #c8860a;
      --text-dark:   #1a2e1e;
      --text-mid:    #3d5a42;
    }

    body {
      font-family: 'Lato', sans-serif;
      background-color: var(--cream);
      color: var(--text-dark);
      padding-top: 60px;
    }

    /* ── NAVIGATION ── */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--green-dark);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 60px;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .nav-logo {
      position: absolute;
      left: 2rem;
      top: 50%;
      transform: translateY(-50%);
      height: 40px;
      width: auto;
    }

    .nav-links {
      display: flex;
      gap: 0.5rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--cream);
      text-decoration: none;
      font-family: 'Lato', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .nav-links a:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .nav-links a.active {
      background: var(--amber);
      color: var(--green-dark);
      font-weight: 700;
    }

    .nav-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
    }

    .nav-toggle span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--cream);
      margin: 5px 0;
      transition: 0.3s;
    }

    @media (max-width: 768px) {
      .nav { padding: 0 1rem; }
      .nav-logo { left: 1rem; }
      .nav-toggle { display: block; }
      .nav-links {
        position: absolute;
        top: 60px;
        left: 0;
        right: 0;
        background: var(--green-dark);
        flex-direction: column;
        padding: 1rem;
        gap: 0;
        display: none;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
      }
      .nav-links.open { display: flex; }
      .nav-links a {
        padding: 0.75rem 1rem;
        border-radius: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .nav-links li:last-child a { border-bottom: none; }
    }

    /* ── SCHEDULE SECTION ── */
    .schedule-section {
      max-width: 100%;
      margin: 0 auto;
      padding: 2rem;
      text-align: center;
    }

    .schedule-section h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--green-dark);
      margin-bottom: 0.5rem;
    }

    .schedule-intro {
      font-size: 1.1rem;
      color: var(--text-mid);
      font-weight: 300;
      margin-bottom: 2rem;
    }

    .sheet-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      height: 760px;
    }

    .sheet-container iframe {
      display: block;
      margin-top: -35px;
      height: 840px;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--cream-dark);
      text-align: center;
      padding: 2rem 1.5rem;
      font-size: 0.82rem;
      color: var(--text-mid);
      letter-spacing: 0.05em;
      border-top: 1px solid rgba(30, 77, 43, 0.12);
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html"><img src="logo.png" alt="Treasure Island" class="nav-logo" /></a>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="how-to.html">How-to</a></li>
      <li><a href="family.html">Family</a></li>
      <li><a href="schedule.html" class="active">Schedule</a></li>
      <li><a href="archive.html">Archive</a></li>
    </ul>
  </nav>

  <section class="schedule-section">
    <h1>Camp Schedule</h1>
    <p class="schedule-intro">See who's at camp and when. Updated automatically.</p>
    <div class="sheet-container">
      <iframe
        src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQEgzWMwYxjojq_yjFbr2tgpGh-IfmjxHC6J1y3MgHWPYuAumAqINxTmNpV-o49gA/pubhtml?widget=true&headers=false"
        width="100%"
        height="800"
        frameborder="0">
        Loading…
      </iframe>
    </div>
  </section>

  <footer>
    <p>Treasure Island Camp &middot; Pointe au Baril, Ontario &middot; Est. 1926</p>
  </footer>

</body>
</html>
