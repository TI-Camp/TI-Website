<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family - Treasure Island Camp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #1e4d2b;
      --green-mid:   #2e6b3e;
      --green-light: #4a8c5c;
      --cream:       #f5f0e6;
      --cream-dark:  #ede6d8;
      --amber:       #c8860a;
      --text-dark:   #1a2e1e;
      --text-mid:    #3d5a42;
    }

    body {
      font-family: 'Lato', sans-serif;
      background-color: var(--cream);
      color: var(--text-dark);
      padding-top: 60px;
    }

    /* ── NAVIGATION ── */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--green-dark);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 60px;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .nav-logo {
      position: absolute;
      left: 2rem;
      top: 50%;
      transform: translateY(-50%);
      height: 40px;
      width: auto;
    }

    .nav-links {
      display: flex;
      gap: 0.5rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--cream);
      text-decoration: none;
      font-family: 'Lato', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .nav-links a:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .nav-links a.active {
      background: var(--amber);
      color: var(--green-dark);
      font-weight: 700;
    }

    .nav-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
    }

    .nav-toggle span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--cream);
      margin: 5px 0;
      transition: 0.3s;
    }

    @media (max-width: 768px) {
      .nav { padding: 0 1rem; }
      .nav-logo { left: 1rem; }
      .nav-toggle { display: block; }
      .nav-links {
        position: absolute;
        top: 60px;
        left: 0;
        right: 0;
        background: var(--green-dark);
        flex-direction: column;
        padding: 1rem;
        gap: 0;
        display: none;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
      }
      .nav-links.open { display: flex; }
      .nav-links a {
        padding: 0.75rem 1rem;
        border-radius: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .nav-links li:last-child a { border-bottom: none; }
    }

    /* ── FAMILY WHEEL ── */
    .family-header {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      background: var(--cream);
      padding: 1rem 2rem;
      text-align: center;
      z-index: 100;
      border-bottom: 1px solid rgba(30, 77, 43, 0.12);
    }

    .family-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--green-dark);
      margin-bottom: 0.25rem;
    }

    .family-header .subtitle {
      font-size: 0.9rem;
      color: var(--text-mid);
      font-weight: 300;
    }

    .wip-badge {
      position: fixed;
      top: 80px;
      right: 20px;
      background: var(--amber);
      color: var(--green-dark);
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      z-index: 101;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
      border: 2px solid var(--green-dark);
    }

    /* ── SEARCH ── */
    .search-container {
      margin-top: 0.75rem;
    }

    .search-input {
      padding: 0.5rem 1rem;
      width: 280px;
      font-family: 'Lato', sans-serif;
      font-size: 0.9rem;
      border: 2px solid var(--green-mid);
      border-radius: 20px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input:focus {
      border-color: var(--green-dark);
      box-shadow: 0 0 0 3px rgba(46, 107, 62, 0.2);
    }

    .search-input::placeholder {
      color: var(--text-mid);
    }

    .wheel-canvas {
      padding-top: 120px;
      overflow: visible;
    }

    #family-wheel {
      display: block;
      background: white;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--cream-dark);
      text-align: center;
      padding: 2rem 1.5rem;
      font-size: 0.82rem;
      color: var(--text-mid);
      letter-spacing: 0.05em;
      border-top: 1px solid rgba(30, 77, 43, 0.12);
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html"><img src="logo.png" alt="Treasure Island" class="nav-logo" /></a>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="how-to.html">How-to</a></li>
      <li><a href="family.html" class="active">Family</a></li>
      <li><a href="schedule.html">Schedule</a></li>
      <li><a href="archive.html">Archive</a></li>
    </ul>
  </nav>

  <div class="wip-badge">WORK IN PROGRESS</div>

  <header class="family-header">
    <h1>The Richardson Family Circle</h1>
    <p class="subtitle">204 descendants across 6 generations · Scroll to explore</p>
    <div class="search-container">
      <input type="text" class="search-input" id="search-input" placeholder="Search for a family member..." />
    </div>
  </header>

  <div class="wheel-canvas">
    <svg id="family-wheel"></svg>
  </div>

  <script>
    // Configuration
    const config = {
      width: 2000,
      height: 2000,
      centerX: 1000,
      centerY: 1000,
      centerRadius: 160,
      ringWidth: 140,
      fontSize: 14,
      centerFontSize: 16
    };

    // Light pastel colors at 60% opacity
    const genColors = [
      "rgba(135, 206, 235, 0.6)", // Gen 0 (center) - Sky blue
      "rgba(255, 215, 100, 0.6)", // Gen 1 - Gold
      "rgba(255, 100, 100, 0.6)", // Gen 2 - Light red
      "rgba(152, 251, 152, 0.6)", // Gen 3 - Pale green
      "rgba(200, 162, 200, 0.6)", // Gen 4 - Lavender
      "rgba(255, 160, 122, 0.6)", // Gen 5 - Light coral
      "rgba(127, 255, 212, 0.6)", // Gen 6 - Aquamarine
      "rgba(240, 230, 140, 0.6)"  // Gen 7+ - Khaki/pale yellow
    ];

    // Generation 1 children in clockwise order from top-right
    // spouses array: order matters (first marriage first)
    const gen1Children = [
      { id: "2", name: "Roland Richardson", spouses: [
        { name: "Althea Ford", order: 1 }
      ], startAngle: 0, endAngle: 90 },
      { id: "5", name: "Emily Richardson", spouses: [
        { name: "Clarence Burton", order: 1 },
        { name: "Jim Carruthers", order: 2 }
      ], startAngle: 90, endAngle: 180 },
      { id: "4", name: "Coombs Richardson", spouses: [
        { name: "Henry LaBoiteaux", order: 1 },
        { name: "Robert Fillmore Lovett", order: 2 }
      ], startAngle: 180, endAngle: 270 },
      { id: "3", name: "Adelaide Richardson", spouses: [
        { name: "Hugh Garvin", order: 1 }
      ], startAngle: 270, endAngle: 360 }
    ];

    // Set up SVG
    const svg = d3.select("#family-wheel")
      .attr("width", config.width)
      .attr("height", config.height)
      .attr("viewBox", `0 0 ${config.width} ${config.height}`);

    // Create main group centered
    const g = svg.append("g")
      .attr("transform", `translate(${config.centerX}, ${config.centerY})`);

    // ══════════════════════════════════════════════
    // SEARCHABLE PEOPLE ARRAY
    // ══════════════════════════════════════════════
    const allPeople = [
      { id: "1", name: "James Clement Richardson Jr.", generation: 0 },
      { id: "1", name: "Sarah Annis Withenbury", generation: 0 }
    ];

    // Add Gen 1 people and their spouses to searchable array
    gen1Children.forEach(child => {
      allPeople.push({ id: child.id, name: child.name, generation: 1 });
      child.spouses.forEach(spouse => {
        allPeople.push({ id: child.id, name: spouse.name, generation: 1 });
      });
    });

    // Note: Gen 2 people will be added after gen2Children is defined

    // ══════════════════════════════════════════════
    // CENTER CIRCLE
    // ══════════════════════════════════════════════
    const centerGroup = g.append("g")
      .attr("class", "person-group")
      .attr("data-person-id", "1")
      .attr("data-generation", "0");

    centerGroup.append("circle")
      .attr("r", config.centerRadius)
      .attr("fill", genColors[0])
      .attr("stroke", "#1a2e1e")
      .attr("stroke-width", 2);

    // Center text - Cinzel font for founding ancestors
    centerGroup.append("text")
      .attr("y", -12)
      .attr("text-anchor", "middle")
      .attr("font-family", "Cinzel, serif")
      .attr("font-size", config.centerFontSize)
      .attr("font-weight", "bold")
      .attr("fill", "#1a2e1e")
      .text("James Clement Richardson Jr.");

    centerGroup.append("text")
      .attr("y", 6)
      .attr("text-anchor", "middle")
      .attr("font-family", "Playfair Display, serif")
      .attr("font-size", 12)
      .attr("font-style", "italic")
      .attr("fill", "#1a2e1e")
      .text("m.");

    centerGroup.append("text")
      .attr("y", 24)
      .attr("text-anchor", "middle")
      .attr("font-family", "Cinzel, serif")
      .attr("font-size", config.centerFontSize)
      .attr("font-weight", "bold")
      .attr("fill", "#1a2e1e")
      .text("Sarah Annis Withenbury");

    // ══════════════════════════════════════════════
    // GENERATION 1 RING
    // ══════════════════════════════════════════════
    const gen1Inner = config.centerRadius;
    const gen1Outer = config.centerRadius + config.ringWidth;

    // Arc generator for wedges
    const arc = d3.arc()
      .innerRadius(gen1Inner)
      .outerRadius(gen1Outer);

    // Draw filled ring for Gen 1
    g.append("path")
      .attr("d", arc({ startAngle: 0, endAngle: 2 * Math.PI }))
      .attr("fill", genColors[1])
      .attr("stroke", "#1a2e1e")
      .attr("stroke-width", 2);

    // Draw wedges and labels for Gen 1
    gen1Children.forEach(child => {
      // Create a group for this person
      const personGroup = g.append("g")
        .attr("class", "person-group")
        .attr("data-person-id", child.id)
        .attr("data-generation", "1")
        .attr("data-name", child.name);

      // Convert degrees to radians (D3 uses radians, 0 = top)
      // Subtract 90 degrees because D3's 0 is at 3 o'clock, we want 12 o'clock
      const startRad = (child.startAngle - 90) * Math.PI / 180;
      const endRad = (child.endAngle - 90) * Math.PI / 180;

      // Draw divider line at start of wedge (full height)
      const lineAngle = startRad;
      const x1 = Math.cos(lineAngle) * gen1Inner;
      const y1 = Math.sin(lineAngle) * gen1Inner;
      const x2 = Math.cos(lineAngle) * gen1Outer;
      const y2 = Math.sin(lineAngle) * gen1Outer;

      personGroup.append("line")
        .attr("x1", x1)
        .attr("y1", y1)
        .attr("x2", x2)
        .attr("y2", y2)
        .attr("stroke", "#1a2e1e")
        .attr("stroke-width", 1);

      // Calculate center angle for blood relative text (full wedge width)
      const midAngle = (startRad + endRad) / 2;
      const textRadius = (gen1Inner + gen1Outer) / 2;

      // Calculate rotation for radial text
      let rotation = (midAngle * 180 / Math.PI) + 90;
      const isFlipped = midAngle > 0 && midAngle < Math.PI;
      if (isFlipped) {
        rotation += 180;
      }

      // Blood relative ALWAYS closest to center
      const bloodRelativeOffset = -40;
      const spouseOffset = 18;

      // Richardson child name (closest to center/previous generation) - full wedge width
      const nameX = Math.cos(midAngle) * (textRadius + bloodRelativeOffset);
      const nameY = Math.sin(midAngle) * (textRadius + bloodRelativeOffset);

      personGroup.append("text")
        .attr("x", nameX)
        .attr("y", nameY)
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "middle")
        .attr("font-family", "Playfair Display, serif")
        .attr("font-size", config.fontSize)
        .attr("font-weight", "bold")
        .attr("fill", "#1a2e1e")
        .attr("transform", `rotate(${rotation}, ${nameX}, ${nameY})`)
        .text(child.name);

      // Handle spouse(s) - subdivide wedge if multiple marriages
      const numSpouses = child.spouses.length;
      const wedgeSpan = endRad - startRad;
      const subWedgeSpan = wedgeSpan / numSpouses;

      child.spouses.forEach((spouse, index) => {
        // Calculate this spouse's sub-wedge angles
        // When text is flipped (bottom half), reverse order so first spouse is visually on left
        const adjustedIndex = isFlipped ? (numSpouses - 1 - index) : index;
        const subStart = startRad + (adjustedIndex * subWedgeSpan);
        const subEnd = subStart + subWedgeSpan;
        const subMidAngle = (subStart + subEnd) / 2;

        // Draw vertical divider line(s) between sub-wedges (only once, on first iteration)
        if (index === 0 && numSpouses > 1) {
          for (let i = 1; i < numSpouses; i++) {
            const dividerAngle = startRad + (i * subWedgeSpan);
            // Divider starts at the "m." level and goes to outer edge
            const dividerInner = textRadius - 5;
            const dx1 = Math.cos(dividerAngle) * dividerInner;
            const dy1 = Math.sin(dividerAngle) * dividerInner;
            const dx2 = Math.cos(dividerAngle) * gen1Outer;
            const dy2 = Math.sin(dividerAngle) * gen1Outer;

            personGroup.append("line")
              .attr("x1", dx1)
              .attr("y1", dy1)
              .attr("x2", dx2)
              .attr("y2", dy2)
              .attr("stroke", "#1a2e1e")
              .attr("stroke-width", 1);
          }
        }

        // Calculate rotation for this sub-wedge's text
        let subRotation = (subMidAngle * 180 / Math.PI) + 90;
        const subIsFlipped = subMidAngle > 0 && subMidAngle < Math.PI;
        if (subIsFlipped) {
          subRotation += 180;
        }

        // "m." in italics (middle of sub-wedge)
        const mX = Math.cos(subMidAngle) * textRadius;
        const mY = Math.sin(subMidAngle) * textRadius;

        personGroup.append("text")
          .attr("x", mX)
          .attr("y", mY)
          .attr("text-anchor", "middle")
          .attr("dominant-baseline", "middle")
          .attr("font-family", "Playfair Display, serif")
          .attr("font-size", config.fontSize - 2)
          .attr("font-style", "italic")
          .attr("fill", "#1a2e1e")
          .attr("transform", `rotate(${subRotation}, ${mX}, ${mY})`)
          .text("m.");

        // Spouse name (furthest from center, in sub-wedge)
        const spouseX = Math.cos(subMidAngle) * (textRadius + spouseOffset);
        const spouseY = Math.sin(subMidAngle) * (textRadius + spouseOffset);

        personGroup.append("text")
          .attr("x", spouseX)
          .attr("y", spouseY)
          .attr("text-anchor", "middle")
          .attr("dominant-baseline", "middle")
          .attr("font-family", "Playfair Display, serif")
          .attr("font-size", config.fontSize)
          .attr("font-weight", "bold")
          .attr("fill", "#1a2e1e")
          .attr("transform", `rotate(${subRotation}, ${spouseX}, ${spouseY})`)
          .text(spouse.name);
      });
    });

    // ══════════════════════════════════════════════
    // GENERATION 2 RING
    // ══════════════════════════════════════════════
    const gen2Inner = gen1Outer;
    const gen2RingWidth = 200; // wider than gen1 to fit tangential text
    const gen2Outer = gen2Inner + gen2RingWidth;

    // Gen 2 data with descendant counts (from family_tree.json)
    // Angles will be calculated based on weight = descendantCount + 1
    const gen2Data = [
      // === ROLAND (0°-90°) - familyId 2 ===
      { id: "13", name: "Ted Richardson", parentFamilyId: 2, descendantCount: 15,
        spouses: [{ name: "Priscilla Grandin", order: 1 }] },
      { id: "14", name: "Betsy Richardson", parentFamilyId: 2, descendantCount: 1,
        spouses: [{ name: "George Kurlin", order: 1 }] },
      { id: "15", name: "Althea Richardson", parentFamilyId: 2, descendantCount: 23,
        spouses: [{ name: "John Mathers McCaslin", order: 1 }, { name: "Jim Surface", order: 2 }] },
      { id: "16", name: "Emily Richardson", parentFamilyId: 2, descendantCount: 17,
        spouses: [{ name: "Joe Boughton", order: 1 }] },

      // === EMILY RICHARDSON - Burton (90°-135°) - familyId 5 ===
      { id: "26", name: "Mary Tylor Burton", parentFamilyId: 5, descendantCount: 19,
        spouses: [{ name: "R.D. Garrison", order: 1 }, { name: "Richard P. Stewart", order: 2 }] },
      // === EMILY RICHARDSON - Carruthers (135°-180°) - familyId 7 ===
      { id: "27", name: "Jimsy Carruthers", parentFamilyId: 7, descendantCount: 0,
        spouses: [] },

      // === COOMBS - LaBoiteaux (180°-225°) - familyId 4 ===
      { id: "22", name: "Emily LaBoiteaux", parentFamilyId: 4, descendantCount: 7,
        spouses: [{ name: "Larry Mannion", order: 1 }] },
      { id: "23", name: "Edith LaBoiteaux", parentFamilyId: 4, descendantCount: 17,
        spouses: [{ name: "Thomas Bogardus", order: 1 }] },
      // === COOMBS - Lovett (225°-270°) - familyId 6 ===
      { id: "83", name: "Robert Fillmore Lovett", parentFamilyId: 6, descendantCount: 8,
        spouses: [{ name: "Sara C. Newcomb", order: 1 }] },
      { id: "25", name: "Linda Coombs Lovett", parentFamilyId: 6, descendantCount: 19,
        spouses: [{ name: "James Crawford", order: 1 }] },

      // === ADELAIDE (270°-360°) - familyId 3 ===
      { id: "17", name: "James Garvin", parentFamilyId: 3, descendantCount: 13,
        spouses: [{ name: "Frances Harrison", order: 1 }, { name: "Jean Strang", order: 2 }, { name: "Gladys Sutravafa Randall", order: 3 }] },
      { id: "18", name: "Hugh Garvin", parentFamilyId: 3, descendantCount: 11,
        spouses: [{ name: "Jane Hamilton", order: 1 }] },
      { id: "19", name: "Annis Garvin", parentFamilyId: 3, descendantCount: 11,
        spouses: [{ name: "Bob Welch", order: 1 }] },
      { id: "20", name: "Adelaide Garvin", parentFamilyId: 3, descendantCount: 10,
        spouses: [{ name: "Bob Cohan", order: 1 }] },
      { id: "21", name: "Frances Garvin", parentFamilyId: 3, descendantCount: 12,
        spouses: [{ name: "William Byrne", order: 1 }] }
    ];

    // Parent family angular spans (from Gen 1 sub-wedges)
    const familySpans = {
      2: { start: 0, end: 90 },      // Roland & Althea Ford
      5: { start: 90, end: 135 },    // Emily & Clarence Burton
      7: { start: 135, end: 180 },   // Emily & Jim Carruthers
      4: { start: 180, end: 225 },   // Coombs & Henry LaBoiteaux
      6: { start: 225, end: 270 },   // Coombs & Robert Lovett
      3: { start: 270, end: 360 }    // Adelaide & Hugh Garvin
    };

    // Calculate weighted angles for each family group
    // Minimum weight ensures even people with few descendants get readable wedges
    const MIN_WEIGHT = 8;

    function calculateWeightedAngles(children, familySpan) {
      const totalWeight = children.reduce((sum, c) => sum + Math.max(c.descendantCount + 1, MIN_WEIGHT), 0);
      const spanDegrees = familySpan.end - familySpan.start;

      let currentAngle = familySpan.start;
      return children.map(child => {
        const weight = Math.max(child.descendantCount + 1, MIN_WEIGHT);
        const angleDegrees = (weight / totalWeight) * spanDegrees;
        const result = {
          ...child,
          startAngle: currentAngle,
          endAngle: currentAngle + angleDegrees
        };
        currentAngle += angleDegrees;
        return result;
      });
    }

    // Group by parentFamilyId and calculate angles
    const familyGroups = {};
    gen2Data.forEach(child => {
      if (!familyGroups[child.parentFamilyId]) {
        familyGroups[child.parentFamilyId] = [];
      }
      familyGroups[child.parentFamilyId].push(child);
    });

    // Build final gen2Children array with calculated angles
    const gen2Children = [];
    Object.keys(familyGroups).forEach(familyId => {
      const span = familySpans[familyId];
      const childrenWithAngles = calculateWeightedAngles(familyGroups[familyId], span);
      gen2Children.push(...childrenWithAngles);
    });

    // Add Gen 2 people and their spouses to searchable array
    gen2Children.forEach(child => {
      allPeople.push({ id: child.id, name: child.name, generation: 2 });
      child.spouses.forEach(spouse => {
        allPeople.push({ id: child.id, name: spouse.name, generation: 2 });
      });
    });

    // Draw filled ring for Gen 2
    const gen2Arc = d3.arc()
      .innerRadius(gen2Inner)
      .outerRadius(gen2Outer);

    g.append("path")
      .attr("d", gen2Arc({ startAngle: 0, endAngle: 2 * Math.PI }))
      .attr("fill", genColors[2])
      .attr("stroke", "#1a2e1e")
      .attr("stroke-width", 2);

    // Draw wedge dividers for Gen 2
    gen2Children.forEach(child => {
      const startRad = (child.startAngle - 90) * Math.PI / 180;

      // Draw divider line at start of each wedge
      const x1 = Math.cos(startRad) * gen2Inner;
      const y1 = Math.sin(startRad) * gen2Inner;
      const x2 = Math.cos(startRad) * gen2Outer;
      const y2 = Math.sin(startRad) * gen2Outer;

      g.append("line")
        .attr("x1", x1)
        .attr("y1", y1)
        .attr("x2", x2)
        .attr("y2", y2)
        .attr("stroke", "#1a2e1e")
        .attr("stroke-width", 1);
    });

    // ── GEN 2 NAMES ──
    // TODO: Implement tangential stacked text for narrow wedges
    // Challenge: Need to figure out how to stack multiple lines of tangential text

    // Scroll to center on load
    window.addEventListener('load', () => {
      const centerX = config.centerX - window.innerWidth / 2;
      const centerY = config.centerY - window.innerHeight / 2 + 60;
      window.scrollTo(centerX, centerY);
    });

    // ══════════════════════════════════════════════
    // SEARCH FUNCTIONALITY
    // ══════════════════════════════════════════════
    const searchInput = document.getElementById('search-input');

    function highlightMatches(searchTerm) {
      const term = searchTerm.toLowerCase().trim();
      const personGroups = document.querySelectorAll('.person-group');

      if (!term) {
        // No search - restore all to full opacity
        personGroups.forEach(group => {
          group.style.opacity = '1';
        });
        return;
      }

      // Find matching person IDs
      const matchingIds = new Set();
      allPeople.forEach(person => {
        if (person.name.toLowerCase().includes(term)) {
          matchingIds.add(person.id);
        }
      });

      // Apply opacity based on matches
      personGroups.forEach(group => {
        const personId = group.getAttribute('data-person-id');
        if (matchingIds.has(personId)) {
          group.style.opacity = '1';
        } else {
          group.style.opacity = '0.2';
        }
      });
    }

    searchInput.addEventListener('input', (e) => {
      highlightMatches(e.target.value);
    });
  </script>

  <footer>
    <p>Treasure Island Camp · Pointe au Baril, Ontario · Est. 1926</p>
  </footer>

</body>
</html>
