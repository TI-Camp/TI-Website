  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #1e4d2b;
      --green-mid:   #2e6b3e;
      --green-light: #4a8c5c;
      --cream:       #f5f0e6;
      --cream-dark:  #ede6d8;
      --amber:       #c8860a;
      --text-dark:   #1a2e1e;
      --text-mid:    #3d5a42;
    }

    body {
      font-family: 'Lato', sans-serif;
      background-color: var(--cream);
      color: var(--text-dark);
      padding-top: 60px;
      overflow: hidden;
      height: 100vh;
    }

    /* ── NAVIGATION ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0;
      background: var(--green-dark);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: center;
      height: 60px; z-index: 1000;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }
    .nav-logo {
      position: absolute; left: 2rem; top: 50%;
      transform: translateY(-50%); height: 40px; width: auto;
    }
    .nav-links { display: flex; gap: 0.5rem; list-style: none; }
    .nav-links a {
      color: var(--cream); text-decoration: none;
      font-family: 'Lato', sans-serif; font-size: 0.9rem; font-weight: 400;
      letter-spacing: 0.05em; padding: 0.5rem 1rem; border-radius: 4px;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .nav-links a:hover { background: rgba(255, 255, 255, 0.1); }
    .nav-links a.active { background: var(--amber); color: var(--green-dark); font-weight: 700; }
    .nav-toggle { display: none; background: none; border: none; cursor: pointer; padding: 0.5rem; }
    .nav-toggle span { display: block; width: 24px; height: 2px; background: var(--cream); margin: 5px 0; transition: 0.3s; }

    @media (max-width: 768px) {
      .nav { padding: 0 1rem; }
      .nav-logo { left: 1rem; }
      .nav-toggle { display: block; }
      .nav-links {
        position: absolute; top: 60px; left: 0; right: 0;
        background: var(--green-dark); flex-direction: column;
        padding: 1rem; gap: 0; display: none;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
      }
      .nav-links.open { display: flex; }
      .nav-links a { padding: 0.75rem 1rem; border-radius: 0; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
      .nav-links li:last-child a { border-bottom: none; }
    }

    /* ── HEADER ── */
    .branch-header {
      position: fixed; top: 60px; left: 0; right: 0;
      background: var(--cream); padding: 0.75rem 2rem; z-index: 100;
      border-bottom: 1px solid rgba(30, 77, 43, 0.12);
      display: flex; align-items: center; justify-content: space-between;
    }
    .branch-header-left { display: flex; align-items: center; gap: 1rem; }
    .back-link {
      color: var(--green-mid); text-decoration: none; font-size: 0.85rem;
      display: flex; align-items: center; gap: 0.3rem; transition: color 0.2s;
    }
    .back-link:hover { color: var(--green-dark); }
    .branch-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--green-dark); }
    .branch-subtitle { font-size: 0.85rem; color: var(--text-mid); font-weight: 300; }
    .branch-controls { display: flex; gap: 0.5rem; align-items: center; }
    .btn {
      background: var(--green-dark); color: var(--cream); border: none;
      padding: 0.4rem 0.9rem; border-radius: 4px; cursor: pointer;
      font-family: 'Lato', sans-serif; font-size: 0.8rem; transition: background 0.2s;
    }
    .btn:hover { background: var(--green-mid); }

    .proposal-badge {
      position: fixed; bottom: 1rem; right: 1rem;
      background: var(--amber); color: var(--green-dark);
      padding: 0.4rem 1rem; border-radius: 6px; font-size: 0.8rem;
      font-weight: 700; letter-spacing: 0.08em; z-index: 101;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2); border: 2px solid var(--green-dark);
    }

    /* ── TREE CANVAS ── */
    #tree-container { position: fixed; top: 120px; left: 0; right: 0; bottom: 0; }
    #tree-container svg { width: 100%; height: 100%; cursor: grab; }
    #tree-container svg:active { cursor: grabbing; }

    .node-card { cursor: pointer; transition: filter 0.2s; }
    .node-card:hover { filter: drop-shadow(0 3px 8px rgba(30, 77, 43, 0.3)); }

    .legend {
      position: fixed; bottom: 1rem; left: 1rem; background: white;
      border: 1px solid rgba(30, 77, 43, 0.15); border-radius: 8px;
      padding: 0.6rem 1rem; font-size: 0.75rem; display: flex; gap: 1rem; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .legend-item { display: flex; align-items: center; gap: 0.3rem; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.15); }

    .search-input {
      padding: 0.4rem 0.8rem; width: 200px; font-family: 'Lato', sans-serif;
      font-size: 0.85rem; border: 2px solid var(--green-mid); border-radius: 20px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus { border-color: var(--green-dark); box-shadow: 0 0 0 3px rgba(46, 107, 62, 0.2); }
    .search-input::placeholder { color: var(--text-mid); }
    .search-result-info { font-size: 0.8rem; color: var(--text-mid); margin-left: 0.5rem; }

    // ══════════════════════════════════════════════
    // CONFIGURATION
    // ══════════════════════════════════════════════

    const genColors = [
      "rgba(86, 180, 233, 0.6)",   // Gen 0
      "rgba(230, 159, 0, 0.6)",    // Gen 1
      "rgba(204, 121, 167, 0.6)",  // Gen 2
      "rgba(0, 158, 115, 0.6)",    // Gen 3
      "rgba(240, 228, 66, 0.6)",   // Gen 4
      "rgba(0, 114, 178, 0.6)",    // Gen 5
    ];
    const genColorsSolid = ["#56B4E9", "#E69F00", "#CC79A7", "#009E73", "#F0E442", "#0072B2"];

    const CARD_W = 130;
    const CARD_H = 140;
    const PHOTO_R = 28;
    const COUPLE_GAP = 16;  // gap between couple cards
    const H_SPACING = 310;
    const V_SPACING = 190;

    // ══════════════════════════════════════════════
    // HIERARCHY
    // ══════════════════════════════════════════════

    // Preprocess: convert marriages[] into pseudo-node children
    // A person with marriages gets marriage pseudo-nodes as children,
    // each containing the spouse name and that marriage's children.
    function preprocessMarriages(node) {
      if (node.marriages) {
        node.children = node.marriages.map(m => ({
          name: m.spouse,
          generation: node.generation,
          isMarriageNode: true,
          parentName: node.name,
          children: (m.children || []).map(c => {
            preprocessMarriages(c);
            return c;
          })
        }));
        delete node.marriages;
      }
      if (node.children) {
        node.children.forEach(c => preprocessMarriages(c));
      }
    }
    preprocessMarriages(treeData);

    const root = d3.hierarchy(treeData, d => d.children && d.children.length > 0 ? d.children : null);

    root.each(d => {
      d._allChildren = d.children || null;
      if (d.depth > 1) d.children = null;
    });

    const treeLayout = d3.tree()
      .nodeSize([H_SPACING, V_SPACING])
      .separation((a, b) => {
        // Marriage nodes from same parent should be closer together
        if (a.data.isMarriageNode && b.data.isMarriageNode && a.parent === b.parent) return 0.8;
        return a.parent === b.parent ? 1 : 1.2;
      });

    // ══════════════════════════════════════════════
    // SVG + ZOOM
    // ══════════════════════════════════════════════

    const svg = d3.select("#tree-svg");
    const g = svg.append("g");

    const zoomBehavior = d3.zoom()
      .scaleExtent([0.1, 3])
      .on("zoom", e => g.attr("transform", e.transform));

    svg.call(zoomBehavior);

    // ══════════════════════════════════════════════
    // HELPERS
    // ══════════════════════════════════════════════

    function splitName(fullName) {
      const parts = fullName.split(" ");
      if (parts.length === 1) return { given: parts[0], surname: "" };
      return { given: parts.slice(0, -1).join(" "), surname: parts[parts.length - 1] };
    }

    function truncate(s, max) {
      return s && s.length > max ? s.substring(0, max - 1) + "\u2026" : s;
    }

    function hasSpouse(d) {
      return d.spouse || (d.spouses && d.spouses.length > 0);
    }

    function getFirstSpouse(d) {
      if (d.spouse) return d.spouse;
      if (d.spouses && d.spouses.length > 0) return d.spouses[0];
      return null;
    }

    // Couple width: if has spouse, two cards + gap; else single card
    function coupleWidth(d) {
      return hasSpouse(d) ? CARD_W * 2 + COUPLE_GAP : CARD_W;
    }

    // Link drops from center-bottom of the couple unit
    function linkPath(d) {
      const srcW = coupleWidth(d.source.data);
      const tgtW = coupleWidth(d.target.data);
      // Source: drop from bottom-center
      const sx = d.source.x;
      const sy = d.source.y + CARD_H / 2;
      // Target: arrive at top-center
      const tx = d.target.x;
      const ty = d.target.y - CARD_H / 2;
      const midY = (sy + ty) / 2;
      return `M${sx},${sy} L${sx},${midY} L${tx},${midY} L${tx},${ty}`;
    }

    // ══════════════════════════════════════════════
    // DRAW A SINGLE PERSON CARD
    // ══════════════════════════════════════════════

    function drawPersonCard(parent, name, generation, offsetX, opts) {
      opts = opts || {};
      const cg = parent.append("g")
        .attr("transform", `translate(${offsetX}, 0)`);

      const isPlaceholder = opts.isPlaceholder;
      const genColor = genColors[generation] || genColors[5];
      const genSolid = genColorsSolid[generation] || genColorsSolid[5];

      // Card background with colored top accent
      cg.append("rect")
        .attr("x", -CARD_W / 2).attr("y", -CARD_H / 2)
        .attr("width", CARD_W).attr("height", CARD_H)
        .attr("rx", 8)
        .attr("fill", isPlaceholder ? "#f8f6f0" : "white")
        .attr("stroke", isPlaceholder ? "#d4cfc4" : "#ddd")
        .attr("stroke-width", 1)
        .attr("stroke-dasharray", isPlaceholder ? "4 3" : "none");

      // Colored top accent bar
      cg.append("rect")
        .attr("x", -CARD_W / 2).attr("y", -CARD_H / 2)
        .attr("width", CARD_W).attr("height", 4)
        .attr("rx", 2)
        .attr("fill", genSolid);

      // Photo circle
      const photoY = -CARD_H / 2 + 42;
      cg.append("circle")
        .attr("cx", 0).attr("cy", photoY).attr("r", PHOTO_R)
        .attr("fill", isPlaceholder ? "#eae6dc" : "#f0ece4")
        .attr("stroke", "#ddd")
        .attr("stroke-width", 1);

      // Silhouette placeholder (simple person icon)
      cg.append("text")
        .attr("x", 0).attr("y", photoY + 5)
        .attr("text-anchor", "middle")
        .attr("font-size", 22)
        .attr("fill", isPlaceholder ? "#ccc5b8" : "#c5bfb2")
        .text("\uD83D\uDC64");

      // Name
      const { given, surname } = splitName(name);
      const nameY = photoY + PHOTO_R + 16;

      cg.append("text")
        .attr("y", nameY).attr("text-anchor", "middle")
        .attr("font-family", "Lato, sans-serif")
        .attr("font-size", 12).attr("font-weight", "400")
        .attr("fill", "#1a2e1e")
        .text(truncate(given, 18));

      cg.append("text")
        .attr("y", nameY + 15).attr("text-anchor", "middle")
        .attr("font-family", "Lato, sans-serif")
        .attr("font-size", 13).attr("font-weight", "700")
        .attr("fill", "#1a2e1e")
        .text(truncate(surname, 16));

      // Birth-death years (if available)
      if (opts.birthYear || opts.deathYear) {
        const years = (opts.birthYear || "?") + "\u2013" + (opts.deathYear || "Living");
        cg.append("text")
          .attr("y", nameY + 30).attr("text-anchor", "middle")
          .attr("font-family", "Lato, sans-serif")
          .attr("font-size", 10).attr("fill", "#888")
          .text(years);
      }

      return cg;
    }

    // ══════════════════════════════════════════════
    // DRAW FUNCTIONS
    // ══════════════════════════════════════════════

    function draw() {
      treeLayout(root);

      const nodes = root.descendants();
      const links = root.links();

      g.selectAll(".link").remove();
      g.selectAll(".link")
        .data(links)
        .enter().append("path")
        .attr("class", "link")
        .attr("d", linkPath)
        .attr("fill", "none")
        .attr("stroke", "#c5ccc3")
        .attr("stroke-width", 1.5);

      g.selectAll(".node-card").remove();

      const node = g.selectAll(".node-card")
        .data(nodes)
        .enter().append("g")
        .attr("class", "node-card")
        .attr("transform", d => `translate(${d.x},${d.y})`)
        .on("click", (event, d) => {
          event.stopPropagation();
          if (d.data.isFounders) return;
          if (d.children) {
            d._allChildren = d.children;
            d.children = null;
          } else if (d._allChildren) {
            d.children = d._allChildren;
          }
          draw();
        });

      node.each(function(d) {
        const el = d3.select(this);

        if (d.data.isFounders) {
          drawFoundersNode(el, d);
        } else if (d.data.isMarriageNode) {
          drawMarriageNode(el, d);
        } else if (d.data.isPlaceholder) {
          drawPlaceholderNode(el, d);
        } else {
          drawCoupleNode(el, d);
        }
      });
    }

    // ── FOUNDERS: two side-by-side Ancestry cards ──
    function drawFoundersNode(el, d) {
      const spouse = d.data.spouse;
      const halfGap = COUPLE_GAP / 2;
      const leftX = -(CARD_W / 2 + halfGap);
      const rightX = CARD_W / 2 + halfGap;

      // Left card: Grammie
      drawPersonCard(el, d.data.name, 0, leftX);

      // Horizontal connector
      el.append("line")
        .attr("x1", leftX + CARD_W / 2).attr("y1", 0)
        .attr("x2", rightX - CARD_W / 2).attr("y2", 0)
        .attr("stroke", "#c5ccc3").attr("stroke-width", 1.5);

      // Right card: James
      if (spouse) {
        drawPersonCard(el, spouse, 0, rightX);
      }
    }

    // ── MARRIAGE NODE (pseudo-node: shows spouse card as intermediary) ──
    function drawMarriageNode(el, d) {
      const spouseName = d.data.name;
      const gen = d.data.generation;
      const hasChildren = d._allChildren && d._allChildren.length > 0;

      // Render a single spouse card (slightly smaller, with a subtle marriage indicator)
      drawPersonCard(el, spouseName, gen, 0);

      // Expand/collapse indicator
      if (hasChildren) {
        el.append("text")
          .attr("x", 0).attr("y", CARD_H / 2 + 14)
          .attr("text-anchor", "middle")
          .attr("font-family", "Lato, sans-serif")
          .attr("font-size", 11).attr("fill", "#a3b8a0")
          .text(d.children ? "\u25B2" : "\u25BC");
      }
    }

    // ── PLACEHOLDER NODE ──
    function drawPlaceholderNode(el, d) {
      const spouse = getFirstSpouse(d.data);
      const hasSp = !!spouse;
      const halfGap = COUPLE_GAP / 2;
      const leftX = hasSp ? -(CARD_W / 2 + halfGap) : 0;
      const rightX = CARD_W / 2 + halfGap;

      // Blood relative card
      drawPersonCard(el, d.data.name, d.data.generation, leftX, { isPlaceholder: true });

      // Spouse card
      if (hasSp) {
        el.append("line")
          .attr("x1", leftX + CARD_W / 2).attr("y1", 0)
          .attr("x2", rightX - CARD_W / 2).attr("y2", 0)
          .attr("stroke", "#d4cfc4").attr("stroke-width", 1.5)
          .attr("stroke-dasharray", "4 3");

        drawPersonCard(el, spouse, d.data.generation, rightX, { isPlaceholder: true });
      }

      // "coming soon" label below
      el.append("text")
        .attr("y", CARD_H / 2 + 14).attr("text-anchor", "middle")
        .attr("font-family", "Lato, sans-serif")
        .attr("font-size", 9).attr("font-style", "italic")
        .attr("fill", "#a3b8a0")
        .text(d.data.descendantCount + " descendants \u2014 coming soon");
    }

    // ── REGULAR COUPLE NODE ──
    function drawCoupleNode(el, d) {
      const spouse = getFirstSpouse(d.data);
      const hasSp = !!spouse;
      const hasChildren = d._allChildren && d._allChildren.length > 0;
      const halfGap = COUPLE_GAP / 2;

      // Position: blood relative on left, spouse on right (centered around node x)
      const leftX = hasSp ? -(CARD_W / 2 + halfGap) : 0;
      const rightX = CARD_W / 2 + halfGap;

      // Blood relative card
      drawPersonCard(el, d.data.name, d.data.generation, leftX, {
        birthYear: d.data.birthYear,
        deathYear: d.data.deathYear
      });

      // Spouse card + connector
      if (hasSp) {
        el.append("line")
          .attr("x1", leftX + CARD_W / 2).attr("y1", 0)
          .attr("x2", rightX - CARD_W / 2).attr("y2", 0)
          .attr("stroke", "#c5ccc3").attr("stroke-width", 1.5);

        drawPersonCard(el, spouse, d.data.generation, rightX);
      }

      // Expand/collapse indicator
      if (hasChildren) {
        el.append("text")
          .attr("x", 0).attr("y", CARD_H / 2 + 14)
          .attr("text-anchor", "middle")
          .attr("font-family", "Lato, sans-serif")
          .attr("font-size", 11).attr("fill", "#a3b8a0")
          .text(d.children ? "\u25B2" : "\u25BC");
      }
    }

    // ══════════════════════════════════════════════
    // CONTROLS
    // ══════════════════════════════════════════════

    function fitToScreen() {
      const bounds = g.node().getBBox();
      const parent = svg.node().getBoundingClientRect();
      if (bounds.width === 0 || parent.width === 0) return;

      const padding = 80;
      const scale = Math.min(
        (parent.width - padding * 2) / bounds.width,
        (parent.height - padding * 2) / bounds.height,
        1.2
      );
      const cx = bounds.x + bounds.width / 2;
      const cy = bounds.y + bounds.height / 2;

      svg.transition().duration(500).call(
        zoomBehavior.transform,
        d3.zoomIdentity
          .translate(parent.width / 2, parent.height / 2)
          .scale(scale)
          .translate(-cx, -cy)
      );
    }

    function expandAll() {
      root.each(d => { if (d._allChildren) d.children = d._allChildren; });
      draw();
      setTimeout(fitToScreen, 100);
    }

    function collapseToGen1() {
      root.each(d => { if (d._allChildren) d.children = d._allChildren; });
      root.each(d => { if (d.depth >= 1) d.children = null; });
      draw();
      setTimeout(fitToScreen, 100);
    }

    // ══════════════════════════════════════════════
    // SEARCH
    // ══════════════════════════════════════════════

    document.getElementById("search-input").addEventListener("input", function() {
      const term = this.value.toLowerCase().trim();
      const info = document.getElementById("search-info");

      if (!term) {
        g.selectAll(".node-card").style("opacity", 1);
        info.textContent = "";
        return;
      }

      root.each(d => { if (d._allChildren) d.children = d._allChildren; });
      draw();

      const allNodes = root.descendants();
      const matches = allNodes.filter(d => {
        const data = d.data;
        return data.name.toLowerCase().includes(term)
          || (data.spouse && data.spouse.toLowerCase().includes(term))
          || (data.spouses && data.spouses.some(s => s.toLowerCase().includes(term)))
          || (data.nickname && data.nickname.toLowerCase().includes(term));
      });

      info.textContent = matches.length > 0 ? matches.length + " found" : "No matches";
      g.selectAll(".node-card").style("opacity", d => matches.includes(d) ? 1 : 0.15);

      if (matches.length > 0) {
        const t = matches[0];
        const parent = svg.node().getBoundingClientRect();
        const cur = d3.zoomTransform(svg.node());
        svg.transition().duration(400).call(
          zoomBehavior.transform,
          d3.zoomIdentity.translate(parent.width / 2, parent.height / 2).scale(cur.k).translate(-t.x, -t.y)
        );
      }
    });

    // ══════════════════════════════════════════════
    // INIT
    // ══════════════════════════════════════════════

    draw();
    setTimeout(fitToScreen, 50);
  </script>

</body>
</html>
