name: Email Update Notification

on:
  push:
    branches:
      - main

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit messages
        id: commits
        run: |
          # Get commits from this push
          COMMITS=$(git log --pretty=format:"- %s" ${{ github.event.before }}..${{ github.sha }} 2>/dev/null || git log --pretty=format:"- %s" -5)
          echo "messages<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Treasure Island Website Updated"
          to: jillbo323@gmail.com, boughtonbd@gmail.com, bjboughton@aol.com
          from: Treasure Island Website <boughtonbd@gmail.com>
          body: |
            Hi mom and dad!

            The Treasure Island website has been updated. Here's what changed:

            ${{ steps.commits.outputs.messages }}

            View the site: https://ti-website-gamma.vercel.app

            - Ben (via automated update)
